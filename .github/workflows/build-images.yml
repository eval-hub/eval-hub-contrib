name: Build and push adapter images

on:
  push:
    branches: [main]
    paths: ['adapters/**']
  workflow_dispatch:
    inputs:
      adapter:
        description: 'Adapter to build (leave empty for change-detection)'
        required: false
        type: string

env:
  REGISTRY: quay.io/evalhub

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      adapters: ${{ steps.find.outputs.adapters }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: find
        run: |
          if [[ -n "${{ inputs.adapter }}" ]]; then
            adapters='["${{ inputs.adapter }}"]'
          else
            adapters=$(git diff --name-only HEAD~1 HEAD \
              | grep '^adapters/' \
              | cut -d/ -f2 \
              | sort -u \
              | while read -r dir; do
                  [ -f "adapters/${dir}/Containerfile" ] && echo "$dir"
                done \
              | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          echo "adapters=${adapters}" >> "$GITHUB_OUTPUT"
          echo "Will build: ${adapters}"

  build:
    needs: detect
    if: needs.detect.outputs.adapters != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        adapter: ${{ fromJson(needs.detect.outputs.adapters) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        env:
          ADAPTER: ${{ matrix.adapter }}
        run: |
          # Validate adapter name: directory names are lowercase letters, digits, and hyphens only.
          if [[ ! "$ADAPTER" =~ ^[a-z0-9-]+$ ]]; then
            echo "::error::Invalid adapter name: '${ADAPTER}'" >&2
            exit 1
          fi
          # Mapping of adapter directory name -> image name suffix.
          # Omit an entry to default to community-<adapter>.
          declare -A IMAGE_MAP=(
            [clear]=ibm-clear
          )
          suffix="${IMAGE_MAP[$ADAPTER]:-$ADAPTER}"
          echo "name=community-${suffix}" >> "$GITHUB_OUTPUT"

      - name: Build image
        env:
          ADAPTER: ${{ matrix.adapter }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          docker build \
            -f "adapters/${ADAPTER}/Containerfile" \
            -t "${REGISTRY}/${IMAGE_NAME}:${GIT_SHA}" \
            -t "${REGISTRY}/${IMAGE_NAME}:latest" \
            "adapters/${ADAPTER}"

      - name: Push image
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | docker login quay.io -u "${{ secrets.QUAY_USER }}" --password-stdin
          docker push "${REGISTRY}/${IMAGE_NAME}:${GIT_SHA}"
          docker push "${REGISTRY}/${IMAGE_NAME}:latest"
