name: Test LightEval

on:
  push:
    branches: [main]
    paths: ['adapters/lighteval/**']
  pull_request:
    branches: [main]
    paths: ['adapters/lighteval/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test dependencies
        working-directory: adapters/lighteval
        run: |
          SDK_DEP=$(grep 'eval-hub-sdk' requirements.txt)
          uv pip install --system "$SDK_DEP" -r requirements-test.txt
      - name: Run tests
        working-directory: adapters/lighteval
        run: pytest tests/ -v -m "not local"  # keep lightweight testing isolated which can mock the installation and run of real benchmark code

  test-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install all dependencies
        working-directory: adapters/lighteval
        run: uv pip install --system -r requirements.txt -r requirements-test.txt
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-0.5b
      - name: Start Ollama and pull model
        run: |
          ollama serve &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull qwen2.5:0.5b
      - name: Run local tests
        working-directory: adapters/lighteval
        run: pytest tests/ -v -m local
