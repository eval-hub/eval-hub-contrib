name: Test GuideLLM

on:
  push:
    branches: [main]
    paths: ['adapters/guidellm/**']
  pull_request:
    branches: [main]
    paths: ['adapters/guidellm/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install test dependencies
        working-directory: adapters/guidellm
        run: |
          SDK_DEP=$(grep 'eval-hub-sdk' requirements.txt)
          uv pip install --system "$SDK_DEP" -r requirements-test.txt
      - name: Run tests
        working-directory: adapters/guidellm
        run: pytest tests/ -v -m "not local"  # keep lightweight testing isolated which can mock the installation and run of real benchmark code

  test-local:
    runs-on: ubuntu-latest
    env:
      OLLAMA_MODELS: /home/runner/.ollama-models
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install all dependencies
        working-directory: adapters/guidellm
        run: uv pip install --system -r requirements.txt -r requirements-test.txt
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ${{ env.OLLAMA_MODELS }}
          key: ollama-qwen2.5-0.5b
      - name: Start Ollama and pull model
        run: |
          # Stop the systemd service started by the install script
          sudo systemctl stop ollama 2>/dev/null || true
          # Start ollama with our custom model path
          ollama serve &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull qwen2.5:0.5b
      - name: Run local tests
        working-directory: adapters/guidellm
        run: pytest tests/ -v -s --log-cli-level=INFO -m "local and openai_endpoint"

  test-local-vllm-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install all dependencies
        working-directory: adapters/guidellm
        run: uv pip install --system -r requirements.txt -r requirements-test.txt
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen2.5-0.5b-instruct
      - name: Start vLLM-CPU server
        run: |
          docker run --rm --detach \
            --name vllm-cpu \
            --shm-size=4g \
            -p 11434:8000 \
            -v ~/.cache/huggingface:/root/.cache/huggingface \
            -e VLLM_CPU_KVCACHE_SPACE=4 \
            docker.io/vllm/vllm-openai-cpu:v0.19.1 \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --dtype bfloat16
          echo "Waiting for vLLM health endpoint..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:11434/health >/dev/null 2>&1; then
              echo "vLLM ready (after ${i}x5s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "vLLM failed to start within 300s"
              docker logs vllm-cpu
              exit 1
            fi
            sleep 5
          done
      - name: Run local tests
        working-directory: adapters/guidellm
        run: pytest tests/ -v -s --log-cli-level=INFO -m "local and openai_endpoint"
