apiVersion: apps/v1
kind: Deployment
metadata:
  name: evalhub
  namespace: eval-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evalhub
  template:
    metadata:
      labels:
        app: evalhub
    spec:
      containers:
      - name: evalhub
        image: quay.io/evalhub/evalhub:latest
        ports:
        - containerPort: 8080
        env:
        - name: API_HOST
          value: "0.0.0.0"
        - name: LOG_LEVEL
          value: "INFO"
        - name: EVAL_HUB_CONFIG_DIR
          value: "/etc/evalhub/config"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: evalhub-config
          mountPath: /etc/evalhub/config
          readOnly: true
        - name: evalhub-providers
          mountPath: /etc/evalhub/config/providers
          readOnly: true
      volumes:
      - name: evalhub-config
        configMap:
          name: evalhub-config
      - name: evalhub-providers
        projected:
          sources:
          - configMap:
              name: evalhub-provider-agentdojo
---
apiVersion: v1
kind: Service
metadata:
  name: evalhub
  namespace: eval-hub
spec:
  selector:
    app: evalhub
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: evalhub
  namespace: eval-hub
spec:
  to:
    kind: Service
    name: evalhub
  port:
    targetPort: 8080
  tls:
    termination: edge
