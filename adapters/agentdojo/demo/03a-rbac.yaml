# Grant the default ServiceAccount admin permissions in the eval-hub
# namespace. EvalHub needs this to create ConfigMaps, Pods, and Secrets
# for evaluation job runs.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evalhub-admin
  namespace: eval-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: default
  namespace: eval-hub
